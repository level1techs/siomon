name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: sio-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: sio-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --all-features --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz sio
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Exchange OIDC token for crates.io publish token
        run: |
          # Step 1: Get OIDC JWT from GitHub
          oidc_resp=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://crates.io")
          JWT=$(echo "$oidc_resp" | jq -r '.value')
          if [ "$JWT" = "null" ] || [ -z "$JWT" ]; then
            echo "::error::Failed to get OIDC token from GitHub"
            exit 1
          fi
          # Step 2: Exchange JWT for a short-lived crates.io publish token
          exchange_resp=$(curl -sS -X POST https://crates.io/api/v1/trusted_publishing/tokens \
            -H "Content-Type: application/json" \
            -d "{\"jwt\": \"$JWT\"}")
          CARGO_REGISTRY_TOKEN=$(echo "$exchange_resp" | jq -r '.token')
          if [ "$CARGO_REGISTRY_TOKEN" = "null" ] || [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::Failed to exchange OIDC token with crates.io"
            echo "$exchange_resp" >&2
            exit 1
          fi
          echo "::add-mask::$CARGO_REGISTRY_TOKEN"
          echo "CARGO_REGISTRY_TOKEN=$CARGO_REGISTRY_TOKEN" >> "$GITHUB_ENV"
      - name: Publish
        run: cargo publish --allow-dirty

  github-release:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz
